<div class="Maincontainer">
        <div class="container">
            <div> 🛖 Home</div>
            <div> 👔 Employee Management</div>
        </div>
        <div class="table-container">
            <table class="employeeTable">
                <thead>
                    <tr>
                        <th>First Name</th>
                        <th>Last Name</th>
                        <th>Email</th>
                        <th>Address</th>
                        <th>Phone</th>
                        <th>Organization</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody *ngFor="let emp of employeeDetailsList; let i = index">
                    <td>{{emp.firstname}}</td>
                    <td>{{emp.lastname}}</td>
                    <td>{{emp.email}}</td>
                    <td>{{emp.address}}</td>
                    <td>{{emp.phone}}</td>
                    <td>{{emp.organization}}</td>
        
                    <td class="action-column">
                        <button (click)="editEmployee(i)">✏</button>                        
                        <button (click)="deleteEmployee(i)">🗑</button>
                    </td>
                </tbody>
            </table>
        </div>
</div>
