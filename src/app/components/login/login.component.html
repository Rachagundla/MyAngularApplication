<div class="login-container">

    <h2>Login</h2>
  
    <input
      type="text"
      placeholder="Username"
      [(ngModel)]="username">
  
    <input
      type="password"
      placeholder="Password"
      [(ngModel)]="password">
  
    <button (click)="login()">
      Login
    </button>
  
    <p *ngIf="errorMessage" class="error">
      {{ errorMessage }}
    </p>
  
  </div>
